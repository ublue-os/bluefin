name: Cleanup Old Images
on:
  schedule:
    - cron: "15 0 * * 0" # 0015 UTC on Sundays
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}

jobs:
  delete-older-than-90:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete Images Older Than 90 Days
        uses: dataaxiom/ghcr-cleanup-action@d52806a0dc70b430571a37da1fde39733ffd640f # v1.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          packages: bluefin,bluefin-nvidia,bluefin-nvidia-open,bluefin-hwe,bluefin-hwe-nvidia,bluefin-hwe-nvidia-open,bluefin-asus,bluefin-asus-nvidia,bluefin-asus-nvidia-open,bluefin-surface,bluefin-surface-nvidia,bluefin-surface-nvidia-open,bluefin-dx,bluefin-dx-nvidia,bluefin-dx-nvidia-open,bluefin-dx-hwe,bluefin-dx-hwe-nvidia,bluefin-dx-hwe-nvidia-open,bluefin-dx-asus,bluefin-dx-asus-nvidia,bluefin-dx-asus-nvidia-open,bluefin-dx-surface,bluefin-dx-surface-nvidia,bluefin-dx-surface-nvidia-open
          older-than: 90 days
          delete-orphaned-images: true
          keep-n-tagged: 7
          keep-n-untagged: 7
