name: Reusable Build and Push
on:
  workflow_call:
    outputs:
      digests:
        description: "JSON map of image_name to digest"
        value: ${{ jobs.collect-digests.outputs.digests }}
    inputs:
      image_flavors:
        description: "JSON string of flavors to build, '[main, nvidia]'"
        default: "['main', 'nvidia-open']"
        type: string
      brand_name:
        description: "The Brand Name: bluefin"
        default: bluefin
        type: string
      stream_name:
        description: "The Fedora Version: stable, latest, or beta"
        required: true
        type: string
      kernel_pin:
        description: "The full kernel version to pin"
        type: string
      architecture:
        description: "JSON string of architectures to build, '[\"aarch64\", \"x86_64\"]'"
        default: "['x86_64']"
        required: false
        type: string

env:
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}-${{ inputs.brand_name}}-${{ inputs.stream_name }}
  cancel-in-progress: true

permissions: {}

jobs:
  build_container:
    name: image
    runs-on: ${{ matrix.architecture == 'x86_64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    env:
      DIGEST_FILE: ${{ github.workspace }}/.push-digest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    continue-on-error: false
    strategy:
      fail-fast: false
      matrix:
        image_flavor: ${{ fromJson(inputs.image_flavors) }}
        base_name: ["${{ inputs.brand_name }}", "${{ inputs.brand_name }}-dx"]
        stream_name: ["${{ inputs.stream_name }}"]
        architecture: ${{ fromJson(inputs.architecture) }}
        exclude:
          - architecture: aarch64
            base_name: "${{ inputs.brand_name }}-dx"

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive

      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@695eb75bc387dbcd9685a8e72d23439d8686cba6 # v10

      - name: Mount BTRFS for podman storage
        uses: ublue-os/container-storage-action@dc1f4c8f17b672069e921f001132f7cf98a423a6
        with:
          target-dir: /var/lib/containers
          mount-opts: compress-force=zstd:2
          loopback-free: '1'

      - name: Install Just
        uses: taiki-e/install-action@873c7452cadb7c034694a1282227095d93fbdf92 # just
        with:
          tool: just

      - name: Check Just Syntax
        shell: bash
        run: |
          just check

      - name: Image Name
        shell: bash
        run: |
          IMAGE_NAME="$(just image_name ${{ matrix.base_name }} ${{ matrix.stream_name }} ${{ matrix.image_flavor }})"
          echo "IMAGE_NAME=${IMAGE_NAME}" >> "$GITHUB_ENV"

      - name: Default Tag
        shell: bash
        run: |
          DEFAULT_TAG="$(just generate-default-tag \
                       ${{ matrix.stream_name }} \
                       "1")"
          echo "Default Tag: ${DEFAULT_TAG}"
          echo "DEFAULT_TAG=${DEFAULT_TAG}" >> "$GITHUB_ENV"

      - name: DNF Package Cache Setup
        shell: bash
        id: setup-cache
        env:
          MATRIX_BASE_NAME: ${{ matrix.base_name }}
          MATRIX_STREAM_NAME: ${{ matrix.stream_name }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          CACHE="$(just setup-cache "${MATRIX_BASE_NAME}" \
                            "${MATRIX_STREAM_NAME}" \
                            "1" \
                            "${GITHUB_EVENT_NAME}")"

          CACHE_NAME="$(echo "${CACHE}" | cut -d' ' -f 1)"
          ALLOW_CACHE_WRITE="$(echo "${CACHE}" | cut -d' ' -f 2)"

          echo "cache_name=${CACHE_NAME}" >> "$GITHUB_OUTPUT"
          echo "allow_cache_write=${ALLOW_CACHE_WRITE}" >> "$GITHUB_OUTPUT"

      - name: Restore DNF package cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        env:
          CACHE_NAME: ${{ steps.setup-cache.outputs.cache_name }}
        with:
          path: /var/tmp/buildah-cache-*
          key: ${{ runner.os }}-${{ matrix.architecture }}-buildah-${{ env.CACHE_NAME }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.architecture }}-buildah-

      - name: Build Image
        id: build-image
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sudo -E "$(command -v just)" repo_organization="${{ github.repository_owner }}" \
                    build-ghcr "${{ matrix.base_name }}" \
                               "${{ matrix.stream_name }}" \
                               "${{ matrix.image_flavor }}" \
                               "${{ inputs.kernel_pin }}"

      # https://github.com/actions/cache/issues/1533
      - name: Hack around permission issue caching
        shell: bash
        id: cache-perms
        run: |
          sudo chmod 777 --recursive /var/tmp/buildah-cache-0

      - name: Write new DNF package cache
        if: steps.setup-cache.outputs.allow_cache_write == 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        env:
          CACHE_NAME: ${{ steps.setup-cache.outputs.cache_name }}
        with:
          path: /var/tmp/buildah-cache-*
          key: ${{ runner.os }}-${{ matrix.architecture }}-buildah-${{ env.CACHE_NAME }}

      - name: Setup Syft
        id: setup-syft
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          syft-version: v1.39.0

      - name: Generate SBOM
        if: github.event_name != 'pull_request'
        id: generate-sbom
        env:
          MATRIX_BASE_NAME: ${{ matrix.base_name }}
          MATRIX_STREAM_NAME: ${{ matrix.stream_name }}
          MATRIX_IMAGE_FLAVOR: ${{ matrix.image_flavor }}
          SYFT_CMD: ${{ steps.setup-syft.outputs.cmd }}
        run: |
          sudo -E "$(command -v just)" gen-sbom "${MATRIX_BASE_NAME}" \
                            "${MATRIX_STREAM_NAME}" \
                            "${MATRIX_IMAGE_FLAVOR}" \
                            "${SYFT_CMD}"

      - name: Rechunk Image
        id: rechunk-image
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sudo -E "$(command -v just)" rechunk "${{ matrix.base_name }}" \
                            "${{ matrix.stream_name }}" \
                            "${{ matrix.image_flavor }}" \
                            "1"

      - name: Retag Rechunked Image
        id: load-rechunk
        shell: bash
        run: |
          sudo -E "$(command -v just)" load-rechunk "${{ matrix.base_name }}" \
                            "${{ env.DEFAULT_TAG }}" \
                            "${{ matrix.image_flavor }}"

      - name: Secureboot Check
        id: secureboot
        shell: bash
        run: |
          sudo -E "$(command -v just)" secureboot "${{ matrix.base_name }}" \
                          "${{ env.DEFAULT_TAG }}" \
                          "${{ matrix.image_flavor }}"

      - name: Generate tags
        id: generate-tags
        shell: bash
        run: |
          alias_tags="$(just generate-build-tags \
                     "${{ matrix.base_name }}" \
                     "${{ matrix.stream_name }}" \
                     "${{ matrix.image_flavor }}" \
                     "${{ inputs.kernel_pin }}" \
                     "1" \
                     "$(podman inspect ${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }} | jq -r '.[].Config.Labels["org.opencontainers.image.version"]')" \
                     "${{ github.event_name }}" \
                     "${{ github.event.number }}")"

          echo "Tags for this Action..."
          echo "$alias_tags"
          echo "alias_tags=${alias_tags}" >> "$GITHUB_OUTPUT"

      # Tag Images
      - name: Tag Images
        shell: bash
        run: |
          set -eoux pipefail
          sudo -E "$(command -v just)" tag-images "${{ env.IMAGE_NAME }}" \
                          "${{ env.DEFAULT_TAG }}" \
                          "${{ steps.generate-tags.outputs.alias_tags }}"

      # Workaround bug where capital letters in your GitHub username make it impossible to push to GHCR.
      # https://github.com/macbre/push-to-ghcr/issues/12
      - name: Lowercase Registry
        id: registry_case
        uses: ASzc/change-string-case-action@ecd1412d078f2e06e9eedcbaa6fcd988151c3f82 # v8
        with:
          string: ${{ env.IMAGE_REGISTRY }}

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | podman login ghcr.io -u ${{ github.actor }} --password-stdin
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push to GHCR
        id: push
        if: github.event_name != 'pull_request'
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          max_attempts: 3
          retry_wait_seconds: 15
          timeout_minutes: 30
          command: |
            set -euox pipefail

            REGISTRY="${{ steps.registry_case.outputs.lowercase }}"
            IMAGE="${{ env.IMAGE_NAME }}"
            DEFAULT_TAG="${{ env.DEFAULT_TAG }}"

            rm -f "${{ env.DIGEST_FILE }}"

            # Push default tag with full upload (two-push pattern for annotation stability)
            # Workaround for https://github.com/containers/podman/issues/27796
            sudo -E podman push \
              --compression-format zstd:chunked \
              --compression-level 3 \
              --force-compression \
              --retry 5 \
              --retry-delay 30s \
              "${IMAGE}:${DEFAULT_TAG}" "${REGISTRY}/${IMAGE}:${DEFAULT_TAG}"

            sudo -E podman push \
              --compression-format zstd:chunked \
              --compression-level 3 \
              --force-compression \
              --retry 5 \
              --retry-delay 30s \
              --digestfile "${{ env.DIGEST_FILE }}" \
              "${IMAGE}:${DEFAULT_TAG}" "${REGISTRY}/${IMAGE}:${DEFAULT_TAG}"

            # Server-side tag copies — no re-upload of image data
            # shellcheck disable=SC2086 - word splitting on alias_tags is intentional
            for tag in ${{ steps.generate-tags.outputs.alias_tags }}; do
              if [[ "${tag}" != "${DEFAULT_TAG}" ]]; then
                skopeo copy \
                  "docker://${REGISTRY}/${IMAGE}:${DEFAULT_TAG}" \
                  "docker://${REGISTRY}/${IMAGE}:${tag}"
              fi
            done

      - name: Upload OCI dir as Artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ env.IMAGE_NAME }}.oci
          path: ${{ env.IMAGE_NAME }}_build
          if-no-files-found: warn
          retention-days: 1

      - name: PR Testing Instructions
        if: github.event_name == 'pull_request'
        run: |
          {
            echo "### 🫐 Test this PR build"
            echo ""
            echo "Download the \`.oci\` artifact, unzip it, then:"
            echo '```bash'
            echo "sudo bootc switch --transport oci /absolute/path/to/${{ env.IMAGE_NAME }}_build"
            echo '```'
            echo "To go back:"
            echo '```bash'
            echo "sudo bootc switch --enforce-container-sigpolicy ghcr.io/projectbluefin/${{ env.IMAGE_NAME }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Export digest
        id: digest
        if: github.event_name != 'pull_request'
        run: |
          DIGEST=$(cat "${{ env.DIGEST_FILE }}")
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Write digest to artifact
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          echo "${{ env.IMAGE_NAME }}=${{ steps.digest.outputs.digest }}" >> /tmp/digests/${{ matrix.image_flavor }}-${{ matrix.base_name }}.txt

      - name: Upload digest artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: image-digest-${{ inputs.stream_name }}-${{ matrix.base_name }}-${{ matrix.image_flavor }}
          path: /tmp/digests/
          retention-days: 1

      - name: Install Cosign
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1
        if: github.event_name != 'pull_request'

      - name: Fix sigstore cache permissions
        if: github.event_name != 'pull_request'
        run: sudo chown -R "$(id -u):$(id -g)" "${HOME}/.sigstore" 2>/dev/null || true

      - name: Sign container image
        if: github.event_name != 'pull_request'
        run: |
          cosign sign -y "${{ steps.registry_case.outputs.lowercase }}/${{ env.IMAGE_NAME }}@${TAGS}"
        env:
          TAGS: ${{ steps.digest.outputs.digest }}

      - name: Install ORAS
        if: github.event_name != 'pull_request'
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2.0.0

      - name: Login to GitHub Container Registry with ORAS
        if: github.event_name != 'pull_request'
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | oras login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Upload SBOM
        if: github.event_name != 'pull_request'
        id: upload-sbom
        env:
          IMAGE: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}
          DIGEST: ${{ steps.digest.outputs.digest }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          SBOM="sbom_out/${IMAGE_NAME}/sbom.json"

          cd "$(dirname "${SBOM}")"
          oras attach \
            --artifact-type application/vnd.spdx+json \
            --annotation "filename=$(basename "$SBOM")" \
            "${IMAGE}@${DIGEST}" \
            "$(basename "$SBOM")"

          sbom_digest=$(oras discover --format json "${IMAGE}@${DIGEST}" | jq -r '.referrers[] | select(.artifactType == "application/vnd.spdx+json") | .digest')

          echo "sbom_digest=${sbom_digest}" >> "$GITHUB_OUTPUT"

      - name: Sign SBOM OCI Artifact
        if: github.event_name != 'pull_request'
        env:
          LOWERCASE: ${{ steps.registry_case.outputs.lowercase }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          SBOM_DIGEST: ${{ steps.upload-sbom.outputs.sbom_digest }}
        run: |
          cosign sign -y "${LOWERCASE}/${IMAGE_NAME}@${SBOM_DIGEST}"

      - name: Attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 #v4.1.0
        with:
          subject-name: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true

  check:
    name: Check all ${{ inputs.stream_name }} builds successful
    if: always()
    runs-on: ubuntu-latest
    needs: [build_container]
    steps:
      - name: Check Jobs
        env:
          JOBS: ${{ toJson(needs) }}
        run: |
          echo "Job status:"
          echo "$JOBS" | jq -r 'to_entries[] | " - \(.key): \(.value.result)"'

          for i in $(echo "$JOBS" | jq -r 'to_entries[] | .value.result'); do
            if [ "$i" != "success" ] && [ "$i" != "skipped" ]; then
              echo ""
              echo "Status check not okay!"
              exit 1
            fi
          done

  collect-digests:
    name: Collect image digests
    runs-on: ubuntu-latest
    needs: [check]
    outputs:
      digests: ${{ steps.merge.outputs.digests || steps.empty.outputs.digests }}
    steps:
      - name: Download all digest artifacts
        if: github.event_name != 'pull_request'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: image-digest-${{ inputs.stream_name }}-*
          merge-multiple: true
          path: /tmp/digests

      - name: Merge digests
        if: github.event_name != 'pull_request'
        id: merge
        run: |
          DIGESTS=$(cat /tmp/digests/*.txt | jq -Rs 'split("\n") | map(select(length > 0)) | map(split("=")) | map({(.[0]): .[1]}) | add')
          {
            echo "digests<<EOF"
            echo "${DIGESTS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set empty digests
        if: github.event_name == 'pull_request'
        id: empty
        run: |
          echo 'digests={}' >> "$GITHUB_OUTPUT"
