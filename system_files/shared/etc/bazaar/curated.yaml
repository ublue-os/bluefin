# https://github.com/bazaar-org/bazaar/blob/main/docs/overview.md

rows:
  # ── Reorganization notice ─────────────────────────────────────────────────
  # Remove once Bazaar v0.9.0+ ships on Flathub stable

  - banner:
      light-color: "#c97a1a"
      dark-color: "#5c3a00"
      height: 70

  - section:
      title: "🚧 Reorganization in Progress"
      subtitle:
        string: |
          This page requires **Bazaar v0.9.0** or later. If apps are not showing, update Bazaar from Flathub and relaunch. Full curation is coming — hang tight.
      appids:
        list: []

  # ── Featured carousel ─────────────────────────────────────────────────────

  - featured-carousel:
      appids:
        list:
          - be.alexandervanhee.gradia
          - app.drey.Damask
          - app.fotema.Fotema
          - io.github.tanaybhomia.Whisp
          - re.sonny.Eloquent
          - com.valvesoftware.Steam
          - io.podman_desktop.PodmanDesktop
          - com.jeffser.Alpaca

  # ── Articles ──────────────────────────────────────────────────────────────

  - articles:
      aspect-ratio: 1.777
      list:
        - title: "Welcome to Bluefin"
          subtitle: "Cloud-native Linux, reimagined"
          image: file:///run/host/etc/bazaar/11-bluefin-day.png
          uri: file:///tmp/bazaar-proto/article-welcome.md
        - title: "Developer Tools Deep Dive"
          subtitle: "Cloud Native on the Desktop"
          image: file:///run/host/etc/bazaar/06-bluefin-day.png
          uri: file:///tmp/bazaar-proto/article-devtools.md

